<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Sementic02</title>
  <style>
    body {
      background: #fd9488;
    }
    #wrap {
      width: 1000px;
      margin: 0 auto;
      font-size: 40px;
      font-weight: bold;
      color: #224488;
      text-align: center;
      text-transform: uppercase;
    }
    header {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #44d987;
    }
    nav {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #990055;
    }
    aside {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #ffc000;
    }
    section {
      float: left;
      width: 700px;
      height: 600px;
      line-height: 600px;
      background: #bd8894;
    }
    footer {
      clear: both;
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #44558e;
    }
  </style>
</head>
<body>
 
  <!-- wrap -->
  <div id="wrap">
    <header>
      header
    </header>
    <nav>
      nav
    </nav>
    <aside>
      aside
    </aside>
    <section>
      section
    </section>
    <footer>
      footer
    </footer>
  </div>
  <!-- //wrap -->
  
</body>
</html>
