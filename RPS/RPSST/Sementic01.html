<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Sementic01</title>
  <style>
    body {
      background: #8d9400;
    }
    #wrap {
      width: 1000px;
      margin: 0 auto;
      font-size: 40px;
      font-weight: normal;
      color: #ffffff;
      text-transform: uppercase;
      text-align: center;
    }
    header {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #111111;
    }
    nav {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #222222;
    }
    aside {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #333333;
    }
    section {
      float: left;
      width: 700px;
      height: 600px;
      line-height: 600px;
      background: #444444;
    }
    footer {
      clear: both;
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #555555;
    }
  </style>
</head>
<body>
 
  <!-- wrap -->
  <div id="wrap">
    <header>
      header
    </header>
    <nav>
      nav
    </nav>
    <aside>
      aside
    </aside>
    <section>
      section
    </section>
    <footer>
      footer
    </footer>
  </div>
  <!-- //wrap -->
  
</body>
</html>
