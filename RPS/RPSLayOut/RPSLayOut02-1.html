<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>RPSLayOut02-1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    #wrap {
      width: 100%;
      margin: 0 auto;
      font-size: 40px;
      font-weight: bold;
      color: #eed049;
      text-transform: uppercase;
      text-align: center;
    }
    header {
      width: 100%;
      height: 150px;
      line-height: 150px;
      background: #4d9400;
    }
    aside {
      float: left;
      width: 30%;
      height: 700px;
      line-height: 700px;
      background: #0def99;
    }
    section {
      float: left;
      width: 40%;
      height: 700px;
      line-height: 700px;
      background: #8411d9;
    }
    article {
      float: left;
      width: 30%;
      height: 700px;
      line-height: 700px;
      background: #66ff84;
    }
    footer {
      clear: both;
      width: 100%;
      height: 150px;
      line-height: 150px;
      background: #ff0033;
    }
    
    /* 미디어 쿼리 */
    
    /* 화면 너비가 0 ~ 1200px */
    @media (max-width: 1220px) {
      aside {
        width: 40%;
      }
      section {
        width: 60%;
      }
      article {
        width: 100%;
        height: 300px;
        line-height: 300px;
      }
    }
    
    /* 화면 너비가 0 ~ 768px */
    @media (max-width: 768px) {
      aside {
        width: 100%;
        height: 300px;
        line-height: 300px;
      }
      section {
        width: 100%;
        height: 300px;
        line-height: 300px;
      }
    }
    
    /* 화면 너비가 0 ~ 480px */
    @media (max-width: 480px) {
      header {
        height: 300px;
        line-height: 300px;
      }
      aside {
        width: 100%;
        height: 200px;
        line-height: 200px;
      }
      section {
        width: 100%;
        height: 200px;
        line-height: 200px;
      }
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
    <header>
      header
    </header>
    <aside>
      aside
    </aside>
    <section>
      section
    </section>
    <article>
      article
    </article>
    <footer>
      footer
    </footer>
  </div>
  <!-- //wrap -->
  
</body>
</html>
