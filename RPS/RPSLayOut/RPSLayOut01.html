<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>RPSLayOut01</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      background: #f3e5f5;
    }
    #wrap {
      width: 1200px;
      margin: 0 auto;
    }
    header {
      width: 100%;
      height: 150px;
      background: #9575cd;
    }
    aside {
      float: left;
      width: 30%;
      height: 700px;
      background: #7e57c2;
    }
    section {
      float: left;
      width: 70%;
      height: 700px;
      background: #673ab7;
    }
    footer {
      clear: both;
      width: 100%;
      height: 150px;
      background: #5e35b1;
    }
    
    /* 미디어 쿼리 */
    
    @media (max-width: 1220px) {
      #wrap {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
    <header></header>
    <aside></aside>
    <section></section>
    <footer></footer>
  </div>
  <!-- //wrap -->
  
</body>
</html>
