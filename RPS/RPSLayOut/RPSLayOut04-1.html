<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>RPSLayOut04-1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      background: #d90488;
    }
    #wrap {
      width: 1200px;
      margin: 0 auto;
      font-size: 40px;
      font-weight: bold;
      color: #ff0000;
      text-transform: uppercase;
      text-align: center;
    }
    header {
      width: 100%;
      height: 100px;
      line-height: 100px;
      background: #44dd94;
    }
    nav {
      width: 100%;
      height: 300px;
      line-height: 300px;
      background: #11edb9;
    }
    section {
      font-size: 20px;
      overflow: hidden;
      width: 90%;
      background: #339900;
      padding: 5%;
    }
    section > div {
      float: left;
      width: 18%;
      margin: 1%;
      height: 170px;
      line-height: 170px;
      background: #334400;
      border-radius: 5px;
    }
    footer {
      width: 100%;
      height: 100px;
      line-height: 100px;
      background: #ebdc94;
    }
    
    /* 미디어 쿼리 */
    
    /* 화면 너비가 0 ~ 1200px */
    @media (max-width: 1220px) {
      #wrap {
        width: 100%;
      }
      section > div {
        width: 23%;
      }
      section > div:nth-child(5n) {
        display: none;
      }
    }
    
    /* 화면 너비가 0 ~ 768px */
    @media (max-width: 768px) {
      section > div {
        width: 31.3333%;
      }
      section > div:nth-child(5) {
        display: block;
      }
    }
    
    /* 화면 너비가 0 ~ 480px */
    @media (max-width: 480px) {
      section > div {
        width: 48%;
      }
      section > div:nth-child(5n) {
        display: block;
      }
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
    <header>
      header
    </header>
    <nav>
      nav
    </nav>
    <section>
      <div>
        section01
      </div>
      <div>
        section02
      </div>
      <div>
        section03
      </div>
      <div>
        section04
      </div>
      <div>
        section05
      </div>
      <div>
        section06
      </div>
      <div>
        section07
      </div>
      <div>
        section08
      </div>
      <div>
        section09
      </div>
      <div>
        section10
      </div>
    </section>
    <footer>
      footer
    </footer>
  </div>
  <!-- //wrap -->
  
</body>
</html>
