<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>RPSLayOut01-1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      background: #44eed4;
    }
    #wrap {
      width: 1200px;
      margin: 0 auto;
      font-size: 40px;
      font-weight: bold;
      color: #ff0000;
      text-transform: uppercase;
      text-align: center;
    }
    header {
      width: 100%;
      height: 150px;
      line-height: 150px;
      background: #ed9400;
    }
    aside {
      float: left;
      width: 30%;
      height: 700px;
      line-height: 700px;
      background: #aa9988;
    }
    section {
      float: left;
      width: 70%;
      height: 700px;
      line-height: 700px;
      background: #33dd88;
    }
    footer {
      clear: both;
      width: 100%;
      height: 150px;
      line-height: 150px;
      background: #4d9482;
    }
    
    /* 미디어 쿼리 */
    
    /* 화면 너비가 0 ~ 1200px */
    @media (max-width: 1220px) {
      #wrap {
        width: 95%;
      }
    }
    
    /* 화면 너비가 0 ~ 768px */
    @media (max-width: 768px) {
      #wrap {
        width: 100%;
      }
    }
    
    /* 화면 너비가 0 ~ 480px */
    @media (max-width: 480px) {
      #wrap {
        width: 100%;
      }
      header {
        height: 300px;
        line-height: 300px;
      }
      aside {
        float: none;
        width: 100%;
        height: 300px;
        line-height: 300px;
      }
      section {
        float: none;
        width: 100%;
        height: 300px;
        line-height: 300px;
      }
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
    <header>
      header
    </header>
    <aside>
      aside
    </aside>
    <section>
      section
    </section>
    <footer>
      footer
    </footer>
  </div>
  <!-- //wrap -->
  
</body>
</html>
