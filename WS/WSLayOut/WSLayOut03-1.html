<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut03-1</title>
  <style>
    body {
      background: #4590aa;
    }
    #wrap {
      width: 1000px;
      height: 900px;
      margin: 0 auto;
      font-size: 40px;
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      color: #000000;
      text-shadow: 1px 1px 1px #ffffff;
    }
    .side {
      float: left;
      width: 300px;
      height: 900px;
      line-height: 900px;
      background: #55d490;
    }
    .header {
      float: left;
      width: 700px;
      height: 300px;
      line-height: 300px;
      background: #ffcc00;
    }
    .contents {
      float: left;
      width: 700px;
      height: 300px;
      line-height: 300px;
      background: #42dd40;
    }
    .footer {
      float: left;
      width: 700px;
      height: 300px;
      line-height: 300px;
      background: #12eb9a;
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
   
    <!-- side -->
    <div class="side">
      side
    </div>
    <!-- //side -->
    
    <!-- header -->
    <div class="header">
      header
    </div>
    <!-- //header -->
    
    <!-- contents -->
    <div class="contents">
      contents
    </div>
    <!-- //contents -->
    
    <!-- footer -->
    <div class="footer">
      footer
    </div>
    <!-- //footer -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
