<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut07-1</title>
  <style>
    /* 리셋 */
    * {
      margin: 0;
      padding: 0;
    }
    
    /* 전체 레이아웃 */
    #wrap {
      font-size: 40px;
      font-weight: bold;
      text-align: center;
      text-transform: uppercase;
      color: #000000;
      text-shadow: 1px 1px 1px #ffffff;
    }
    #header {
      height: 140px;
    }
    #banner {
      height: 450px;
      line-height: 450px;
      background: #8899e9;
    }
    #contents {
      height: 950px;
    }
    #footer {
      height: 220px;
    }
    
    /* 레이아웃 */
    #header-top {
      height: 70px;
      line-height: 70px;
      background: #44dd90;
    }
    #header-nav {
      height: 70px;
      line-height: 70px;
      background: #90d488;
    }
    #content1 {
      height: 90px;
      line-height: 90px;
      background: #55d940;
    }
    #content2 {
      height: 480px;
      line-height: 480px;
      background: #ffc000;
    }
    #content3 {
      height: 380px;
      line-height: 380px;
      background: #0d94e8;
    }
    #footer-nav {
      height: 60px;
      line-height: 60px;
      background: #d490e6;
    }
    #footer-info {
      height: 160px;
      line-height: 160px;
      background: #14dd30;
    }
    
    /* 컨테이너 */
    .container {
      width: 1100px;
      height: inherit;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
    
    <!-- header -->
    <div id="header">
     
      <!-- header-top -->
      <div id="header-top">
        
        <!-- container -->
        <div class="container">
          header-top
        </div>
        <!-- //container -->
        
      </div>
      <!-- //header-top -->
      
      <!-- header-nav -->
      <div id="header-nav">
        
        <!-- container -->
        <div class="container">
          header-nav
        </div>
        <!-- //container -->
        
      </div>
      <!-- //header-nav -->
      
    </div>
    <!-- //header -->
    
    <!-- banner -->
    <div id="banner">
      
      <!-- container -->
      <div class="container">
        banner
      </div>
      <!-- //container -->
      
    </div>
    <!-- //banner -->
    
    <!-- contents -->
    <div id="contents">
      
      <!-- content1 -->
      <div id="content1">
       
        <!-- container -->
        <div class="container">
          content1
        </div>
        <!-- //container -->
        
      </div>
      <!-- //content1 -->
      
      <!-- content2 -->
      <div id="content2">
        
        <!-- container -->
        <div class="container">
          content2
        </div>
        <!-- //container -->
        
      </div>
      <!-- //content2 -->
      
      <!-- content3 -->
      <div id="content3">
        
        <!-- container -->
        <div class="container">
          content3
        </div>
        <!-- //container -->
        
      </div>
      <!-- //content3 -->
      
    </div>
    <!-- //contents -->
    
    <!-- footer -->
    <div id="footer">
      
      <!-- footer-nav -->
      <div id="footer-nav">
        
        <!-- container -->
        <div class="container">
          footer-nav
        </div>
        <!-- //container -->
        
      </div>
      <!-- //footer-nav -->
      
      <!-- footer-info -->
      <div id="footer-info">
        
        <!-- container -->
        <div class="container">
          footer-info
        </div>
        <!-- //container -->
        
      </div>
      <!-- //footer-info -->
      
    </div>
    <!-- //footer -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
