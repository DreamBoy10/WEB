<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut02-1</title>
  <style>
    body {
      background: #44d490;
    }
    #wrap {
      width: 1000px;
      height: 900px;
      margin: 0 auto;
      font-size: 40px;
      font-weight: bold;
      color: #000000;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 1px 1px 1px #ffffff;
    }
    #header {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #44d900;
    }
    #nav {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #cde49f;
    }
    #side_left {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #116600;
    }
    #contents {
      float: left;
      width: 400px;
      height: 600px;
      line-height: 600px;
      background: #4d9fd8;
    }
    #side_right {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #a433d9;
    }
    #footer {
      clear: both;
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #00bd9f;
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
   
    <!-- header -->
    <div id="header">
      header
    </div>
    <!-- //header -->
    
    <!-- nav -->
    <div id="nav">
      nav
    </div>
    <!-- //nav -->
    
    <!-- side_left -->
    <div id="side_left">
      side_left
    </div>
    <!-- //side_left -->
    
    <!-- contents -->
    <div id="contents">
      contents
    </div>
    <!-- //contents -->
    
    <!-- side_right -->
    <div id="side_right">
      side_right
    </div>
    <!-- //side_right -->
    
    <!-- footer -->
    <div id="footer">
      footer
    </div>
    <!-- //footer -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
