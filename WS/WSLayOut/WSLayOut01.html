<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut01</title>
  <style>
    body {
      background: #c8e6c9;
    }
    #wrap {
      width: 1000px;
      height: 900px;
      margin: 0 auto;
      font-size: 40px;
      color: #ffffff;
      text-align: center;
      text-transform: uppercase;
    }
    #header {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #2e7d32;
    }
    #nav {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #388e3c;
    }
    #side {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #43a047;
    }
    #contents {
      float: left;
      width: 700px;
      height: 600px;
      line-height: 600px;
      background: #4caf50;
    }
    #footer {
      float: left;
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #66bb6a;
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
    
    <!-- header -->
    <div id="header">
      header
    </div>
    <!-- //header -->
    
    <!-- nav -->
    <div id="nav">
      nav
    </div>
    <!-- //nav -->
    
    <!-- side -->
    <div id="side">
      side
    </div>
    <!-- //side -->
    
    <!-- contents -->
    <div id="contents">
      contents
    </div>
    <!-- //contents -->
    
    <!-- footer -->
    <div id="footer">
      footer
    </div>
    <!-- //footer -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
