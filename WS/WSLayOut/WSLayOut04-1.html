<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut04-1</title>
  <style>
    body {
      background: #99d400;
    }
    #wrap {
      width: 1000px;
      height: 900px;
      margin: 0 auto;
      font-size: 40px;
      font-weight: bold;
      text-transform: uppercase;
      text-align: center;
      color: #000000;
      text-shadow: 1px 1px 1px #ffffff;
    }
    .header {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #56ff90;
    }
    .nav {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #1d94c0;
    }
    .side {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #00e4ff;
    }
    .content1 {
      float: left;
      width: 700px;
      height: 300px;
      line-height: 300px;
      background: #fd4870;
    }
    .content2 {
      float: left;
      width: 700px;
      height: 300px;
      line-height: 300px;
      background: #cb9410;
    }
    .footer {
      clear: both;
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #66dd94;
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
   
    <!-- header -->
    <div class="header">
      header
    </div>
    <!-- //header -->
    
    <!-- nav -->
    <div class="nav">
      nav
    </div>
    <!-- //nav -->
    
    <!-- side -->
    <div class="side">
      side
    </div>
    <!-- //side -->
    
    <!-- content1 -->
    <div class="content1">
      content1
    </div>
    <!-- //content1 -->
    
    <!-- content2 --> 
    <div class="content2">
      content2
    </div>
    <!-- //content2 -->
    
    <!-- footer -->
    <div class="footer">
      footer
    </div>
    <!-- //footer -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
