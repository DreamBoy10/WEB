<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut05</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    #wrap {
      width: 100%;
      height: 1000px;
      font-size: 40px;
      text-align: center;
      text-transform: uppercase;
      color: #ffffff;
    }
    #header-wrap {
      width: 100%;
      background: #8d6e63;
    }
    #banner-wrap {
      width: 100%;
      background: #a1887f;
    }
    #content-wrap {
      width: 100%;
      background: #bcaaa4;
    }
    #footer-wrap {
      width: 100%;
      background: #d7ccc8;
    }
    
    .header-container {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      margin: 0 auto;
      background: #3e2723;
    }
    .banner-container {
      width: 1000px;
      height: 300px;
      line-height: 300px;
      margin: 0 auto;
      background: #4e342e;
    }
    .content-container {
      width: 1000px;
      height: 500px;
      line-height: 500px;
      margin: 0 auto;
      background: #5d4037;
    }
    .footer-container {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      margin: 0 auto;
      background: #6d4c41;
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
   
    <!-- header-wrap -->
    <div id="header-wrap">
      
      <!-- header-container -->
      <div class="header-container">
        header
      </div>
      <!-- //header-container -->
      
    </div>
    <!-- //header-wrap -->
    
    <!-- banner-wrap -->
    <div id="banner-wrap">
     
      <!-- banner-container -->
      <div class="banner-container">
        banner
      </div>
      <!-- //banner-container -->
      
    </div>
    <!-- //banner-wrap -->
    
    <!-- content-wrap -->
    <div id="content-wrap">
      
      <!-- content-container -->
      <div class="content-container">
        content
      </div>
      <!-- //content-container -->
      
    </div>
    <!-- //content-wrap -->
    
    <!-- footer-wrap -->
    <div id="footer-wrap">
      
      <!-- footer-container -->
      <div class="footer-container">
        footer
      </div>
      <!-- //footer-container -->
      
    </div>
    <!-- //footer-wrap -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
