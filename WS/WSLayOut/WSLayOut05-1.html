<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut05-1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }
    #wrap {
      width: 100%;
      height: 1000px;
      color: #000000;
      text-align: center;
      text-transform: uppercase;
      font-weight: bold;
      font-size: 40px;
      text-shadow: 1px 1px 1px #ffffff;
    }
    #header-wrap {
      width: 100%;
      height: 100px;
      background: #44dd90;
    }
    #banner-wrap {
      width: 100%;
      height: 300px;
      background: #0f94d8;
    }
    #content-wrap {
      width: 100%;
      height: 500px;
      background: #8ccd4a;
    }
    #footer-wrap {
      width: 100%;
      height: 100px;
      background: #aa22e9;
    }
    
    .header-container {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      margin: 0 auto;
      background: #ffc000;
    }
    .banner-container {
      width: 1000px;
      height: 300px;
      line-height: 300px;
      margin: 0 auto;
      background: #ff0000;
    }
    .content-container {
      width: 1000px;
      height: 500px;
      line-height: 500px;
      margin: 0 auto;
      background: #2f940d;
    }
    .footer-container {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      margin: 0 auto;
      background: #fd9049;
    }
  </style>
</head>
<body>
  
  <!-- wrap -->
  <div id="wrap">
    
    <!-- header-wrap -->
    <div id="header-wrap">
     
      <!-- header-container -->
      <div class="header-container">
        header
      </div>
      <!-- //header-container -->
      
    </div>
    <!-- //header-wrap -->
    
    <!-- banner-wrap -->
    <div id="banner-wrap">
      
      <!-- banner-container -->
      <div class="banner-container">
        banner
      </div>
      <!-- //banner-container -->
      
    </div>
    <!-- //banner-wrap -->
    
    <!-- content-wrap -->
    <div id="content-wrap">
      
      <!-- content-container -->
      <div class="content-container">
        content
      </div>
      <!-- //content-container -->
      
    </div>
    <!-- //content-wrap -->
    
    <!-- footer-wrap -->
    <div id="footer-wrap">
      
      <!-- footer-container -->
      <div class="footer-container">
        footer
      </div>
      <!-- //footer-container -->
      
    </div>
    <!-- //footer-wrap -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
