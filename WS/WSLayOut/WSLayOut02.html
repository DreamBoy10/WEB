<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>WSLayOut02</title>
  <style>
    body {
      background: #b3e5fc;
    }
    #wrap {
      width: 1000px;
      height: 900px;
      margin: 0 auto;
      font-size: 40px;
      color: #ffffff;
      text-align: center;
      text-transform: uppercase;
    }
    #header {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #0277bd;
    }
    #nav {
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #0288d1;
    }
    #side_left {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #039be5;
    }
    #contents {
      float: left;
      width: 400px;
      height: 600px;
      line-height: 600px;
      background: #03a9f4;
    }
    #side_right {
      float: left;
      width: 300px;
      height: 600px;
      line-height: 600px;
      background: #29b6f6;
    }
    #footer {
      clear: both;
      width: 1000px;
      height: 100px;
      line-height: 100px;
      background: #0288d1;
    }
  </style>
</head>
<body>
  <!-- wrap -->
  <div id="wrap">
    
    <!-- header -->
    <div id="header">
      header
    </div>
    <!-- //header -->
    
    <!-- nav -->
    <div id="nav">
      nav
    </div>
    <!-- //nav -->
    
    <!-- side_left -->
    <div id="side_left">
      side_left
    </div>
    <!-- //side_left -->
    
    <!-- contents -->
    <div id="contents">
      contents
    </div>
    <!-- //contents -->
    
    <!-- side_right -->
    <div id="side_right">
      side_right
    </div>
    <!-- //side_right -->
    
    <!-- footer -->
    <div id="footer">
      footer
    </div>
    <!-- //footer -->
    
  </div>
  <!-- //wrap -->
  
</body>
</html>
